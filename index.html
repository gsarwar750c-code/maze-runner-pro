<!-- GAME -->

    <div id="g-lives" style="font-size:16px"></div>

  <div style="width:100%;max-width:380px;display:flex;justify-content:space-between;margin-bottom:4px">

    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="color:#fff;font-size:14px">⭐ Rate App</span>
      <button onclick="freeCoins(100,'⭐')" style="background:#fbbf2422;border:1px solid #fbbf24;color:#fbbf24;border-radius:16px;padding:6px 14px;font-size:13px">+100🪙</button>
    </div>
  </div>

<!-- LEADERBOARD -->
<div id="leaderboard" style="background:linear-gradient(135deg,#0f0c29,#1a1040)">
  <div style="width:100%;display:flex;align-items:center;margin-bottom:16px">
    <button onclick="show('home')" style="background:transparent;color:#fbbf24;font-size:22px">⬅</button>
    <h2 style="color:#fbbf24;margin:0 auto;font-size:22px">🏆 Leaderboard</h2>
  </div>
  <div id="lb-list" style="width:100%;max-width:380px"></div>
  <button onclick="show('game')" style="margin-top:16px;padding:12px 32px;background:#a78bfa22;border:2px solid #a78bfa;color:#a78bfa;border-radius:30px;font-size:16px;font-weight:bold">▶ Play to Rank Up</button>
</div>

<!-- DAILY -->
<div id="daily" style="background:linear-gradient(135deg,#064e3b,#022c22)">
  <div style="width:100%;display:flex;align-items:center;margin-bottom:16px">
    <button onclick="show('home')" style="background:transparent;color:#34d399;font-size:22px">⬅</button>
    <h2 style="color:#34d399;margin:0 auto;font-size:22px">🎁 Daily Rewards</h2>
  </div>
  <div style="text-align:center;margin-bottom:16px">
    <div style="color:#fff;font-size:15px">🔥 Streak: <span id="streak-val" style="color:#fbbf24;font-weight:bold">1 Days</span></div>
    <div style="color:#999;font-size:13px">Login daily for bigger rewards!</div>
  </div>
  <div id="daily-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;max-width:380px;margin-bottom:20px"></div>
  <button id="claim-btn" onclick="claimDaily()" style="padding:14px 40px;background:#34d399;color:#000;font-weight:bold;font-size:18px;border-radius:30px"></button>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
let G = {
  level:1, lives:3, coins:200, score:0,
  moves:0, time:0, won:false, gameOver:false,
  hintPath:[], hint:false, timeBonus:0,
  streak:1, dailyClaimed:false,
  lb:[
    {name:"ProGamer_PK",score:48200,level:312},
    {name:"MazeKing",score:39500,level:258},
    {name:"SpeedRunner",score:31000,level:201},
    {name:"PuzzleMaster",score:22400,level:147},
    {name:"NightOwl",score:15600,level:98},
  ]
};
let maze=[], pos={r:0,c:0}, timerInt=null, touchStart=null;
const THEMES=[
  {bg:"#0f0c29",wall:"#a78bfa",floor:"#1a1040",player:"#f472b6",name:"🌌 Galaxy"},
  {bg:"#064e3b",wall:"#34d399",floor:"#022c22",player:"#f87171",name:"🌿 Jungle"},
  {bg:"#1e3a5f",wall:"#38bdf8",floor:"#0c1e33",player:"#fb923c",name:"🌊 Ocean"},
  {bg:"#3b0764",wall:"#e879f9",floor:"#1a0030",player:"#67e8f9",name:"🔮 Magic"},
  {bg:"#1c0a00",wall:"#fb923c",floor:"#0d0500",player:"#86efac",name:"🔥 Fire"},
];
const ITEMS=[
  {id:"hint",name:"Hint",icon:"💡",price:50,desc:"Show correct path"},
  {id:"lives",name:"+3 Lives",icon:"❤️",price:100,desc:"Add 3 extra lives"},
  {id:"time",name:"+30s Time",icon:"⏱",price:80,desc:"More time per level"},
  {id:"skip",name:"Skip Level",icon:"⏭",price:150,desc:"Skip current level"},
];

// ── Maze Generator ─────────────────────────────────────────────
function genMaze(cols,rows,seed){
  const g=Array.from({length:rows},(_,r)=>Array.from({length:cols},(_,c)=>({r,c,walls:{top:1,right:1,bottom:1,left:1},visited:0})));
  let rng=seed;
  const rand=()=>{rng=(rng*1664525+1013904223)&0xffffffff;return Math.abs(rng)/0x7fffffff;};
  let cur=g[0][0]; cur.visited=1; const stack=[cur];
  while(stack.length){
    const {r,c}=cur, nb=[];
    if(r>0&&!g[r-1][c].visited) nb.push({cell:g[r-1][c],dir:"top"});
    if(c<cols-1&&!g[r][c+1].visited) nb.push({cell:g[r][c+1],dir:"right"});
    if(r<rows-1&&!g[r+1][c].visited) nb.push({cell:g[r+1][c],dir:"bottom"});
    if(c>0&&!g[r][c-1].visited) nb.push({cell:g[r][c-1],dir:"left"});
    if(nb.length){
      const {cell:next,dir}=nb[Math.floor(rand()*nb.length)];
      const opp={top:"bottom",bottom:"top",left:"right",right:"left"};
      cur.walls[dir]=0; next.walls[opp[dir]]=0; next.visited=1; stack.push(next); cur=next;
    } else cur=stack.pop();
  }
  return g;
}

function solveMaze(m,sr,sc,er,ec){
  const q=[[sr,sc]],vis={};vis[`${sr},${sc}`]=null;
  while(q.length){
    const [r,c]=q.shift();
    if(r===er&&c===ec){
      const path=[];let k=`${r},${c}`;
      while(k!==null){const[pr,pc]=k.split(",").map(Number);path.unshift({r:pr,c:pc});k=vis[k];}
      return path;
    }
    const cell=m[r][c];
    for(const[dr,dc,wall] of [[-1,0,"top"],[1,0,"bottom"],[0,-1,"left"],[0,1,"right"]]){
      const nr=r+dr,nc=c+dc,nk=`${nr},${nc}`;
      if(!cell.walls[wall]&&nr>=0&&nr<m.length&&nc>=0&&nc<m[0].length&&!(nk in vis)){vis[nk]=`${r},${c}`;q.push([nr,nc]);}
    }
  }
  return [];
}

// ── Screen Switch ──────────────────────────────────────────────
function show(id){
  document.querySelectorAll('#home,#game,#store,#leaderboard,#daily').forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='home') updateHome();
  if(id==='game') startLevel();
  if(id==='store') renderStore();
  if(id==='leaderboard') renderLB();
  if(id==='daily') renderDaily();
}

// ── Toast ──────────────────────────────────────────────────────
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}

// ── Home ───────────────────────────────────────────────────────
function updateHome(){
  document.getElementById('h-score').textContent=G.score.toLocaleString();
  document.getElementById('h-level').textContent='Lvl '+G.level;
  document.getElementById('h-coins').textContent='🪙'+G.coins;
}

// ── Game ───────────────────────────────────────────────────────
function getCols(){return Math.min(9+Math.floor(G.level/50),15);}
function getRows(){return Math.min(9+Math.floor(G.level/50),15);}
function getTimeLimit(){return Math.max(15,90-Math.floor(G.level/20))+G.timeBonus;}
function getTheme(){return THEMES[Math.floor((G.level-1)/200)%THEMES.length];}
function getCellSize(cols,rows){return Math.min(36,Math.floor(310/Math.max(cols,rows)));}

function startLevel(){
  clearInterval(timerInt);
  G.moves=0; G.time=0; G.won=false; G.gameOver=false; G.hint=false; G.hintPath=[];
  pos={r:0,c:0};
  const cols=getCols(),rows=getRows(),th=getTheme();
  maze=genMaze(cols,rows,G.level*7919);
  document.getElementById('game').style.background=th.bg;
  buildDPad(th);
  drawMaze();
  showOverlayLevel(th);
  updateGameUI();
}

function restartLevel(){ if(document.getElementById('game').classList.contains('active')) startLevel(); }

function updateGameUI(){
  const th=getTheme();
  document.getElementById('g-title').textContent=`Lvl ${G.level}/1000 • ${th.name}`;
  document.getElementById('g-title').style.color='#fff';
  document.getElementById('g-lives').textContent='❤️'.repeat(G.lives)+'🖤'.repeat(Math.max(0,3-G.lives));
  document.getElementById('g-coins').textContent='🪙'+G.coins;
  document.getElementById('g-moves').textContent='Moves:'+G.moves;
  const tl=getTimeLimit(), left=tl-G.time;
  document.getElementById('g-timer').textContent='⏱'+left+'s';
  document.getElementById('g-timer').style.color=G.time>tl*0.7?'#f87171':'#86efac';
  document.getElementById('g-bar').style.width=`${(left/tl)*100}%`;
  document.getElementById('g-bar').style.background=G.time>tl*0.7?'#f87171':th.wall;
}

function drawMaze(){
  const cols=getCols(),rows=getRows(),cs=getCellSize(cols,rows),th=getTheme();
  const cv=document.getElementById('maze-canvas');
  cv.width=cols*cs; cv.height=rows*cs;
  cv.style.boxShadow=`0 0 25px ${th.wall}44`;
  const ctx=cv.getContext('2d');
  ctx.fillStyle=th.floor; ctx.fillRect(0,0,cv.width,cv.height);
  // hint path
  if(G.hint) G.hintPath.forEach(pt=>{
    ctx.fillStyle='#ffffff18';
    ctx.fillRect(pt.c*cs+3,pt.r*cs+3,cs-6,cs-6);
  });
  // walls
  ctx.strokeStyle=th.wall; ctx.lineWidth=2.5;
  maze.forEach(row=>row.forEach(({r,c,walls})=>{
    const x=c*cs,y=r*cs;
    if(walls.top){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cs,y);ctx.stroke();}
    if(walls.right){ctx.beginPath();ctx.moveTo(x+cs,y);ctx.lineTo(x+cs,y+cs);ctx.stroke();}
    if(walls.bottom){ctx.beginPath();ctx.moveTo(x,y+cs);ctx.lineTo(x+cs,y+cs);ctx.stroke();}
    if(walls.left){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+cs);ctx.stroke();}
  }));
  // goal
  ctx.font=`${cs*0.55}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🏁',(cols-1)*cs+cs/2,(rows-1)*cs+cs/2);
  // player
  if(!G.won){
    ctx.beginPath();
    ctx.arc(pos.c*cs+cs/2,pos.r*cs+cs/2,cs*0.3,0,Math.PI*2);
    ctx.fillStyle=th.player; ctx.fill();
  }
}

function showOverlayLevel(th){
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`<div style="color:${th.wall};font-size:34px;font-weight:bold;text-shadow:0 0 20px ${th.wall}">Level ${G.level}</div><div style="color:#fff;font-size:15px;margin-top:6px">${th.name}</div>`;
  setTimeout(()=>{ ov.style.display='none'; startTimer(); },1500);
}

function startTimer(){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    G.time++;
    updateGameUI();
    if(G.time>=getTimeLimit()){
      clearInterval(timerInt);
      G.lives--;
      if(G.lives<=0){ G.gameOver=true; showOverlayGameOver(); }
      else{ toast('⏰ Time up! Life lost!'); startLevel(); }
    }
  },1000);
}

function move(dr,dc){
  if(G.won||G.gameOver||!maze.length) return;
  const {r,c}=pos, cell=maze[r][c];
  if(dr===-1&&cell.walls.top) return;
  if(dr===1&&cell.walls.bottom) return;
  if(dc===-1&&cell.walls.left) return;
  if(dc===1&&cell.walls.right) return;
  const nr=r+dr,nc=c+dc,cols=getCols(),rows=getRows();
  if(nr<0||nr>=rows||nc<0||nc>=cols) return;
  pos={r:nr,c:nc}; G.moves++;
  if(G.hint) G.hintPath=G.hintPath.filter(p=>!(p.r===nr&&p.c===nc));
  drawMaze(); updateGameUI();
  if(nr===rows-1&&nc===cols-1){
    clearInterval(timerInt);
    const pts=Math.max(100,1000-G.moves*5-G.time*3);
    const earned=Math.floor(pts/10);
    G.score+=pts; G.coins+=earned;
    toast(`+${pts} pts  +${earned} 🪙`);
    G.won=true;
    G.lb=[...G.lb.filter(x=>x.name!=='You'),{name:'You',score:G.score,level:G.level}].sort((a,b)=>b.score-a.score).slice(0,8);
    showOverlayWin(pts);
  }
}

function showOverlayWin(pts){
  const ov=document.getElementById('overlay'),th=getTheme();
  ov.style.display='flex';
  ov.innerHTML=`<div style="font-size:48px">🎉</div>
  <div style="color:#fbbf24;font-size:26px;font-weight:bold">Level Clear!</div>
  <div style="color:#86efac;font-size:14px;margin:4px 0">+${pts} pts</div>
  <button onclick="nextLevel()" style="margin-top:10px;padding:10px 28px;background:${th.wall};color:#000;font-weight:bold;font-size:16px;border-radius:30px">${G.level<1000?'Next Level →':'🏆 Completed!'}</button>`;
}

function showOverlayGameOver(){
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`<div style="font-size:48px">💀</div>
  <div style="color:#f87171;font-size:26px;font-weight:bold">Game Over</div>
  <div style="color:#fff;font-size:14px">Score: ${G.score.toLocaleString()}</div>
  <button onclick="resetGame()" style="margin-top:10px;padding:10px 28px;background:#f87171;color:#fff;font-weight:bold;font-size:16px;border-radius:30px">Restart</button>`;
}

function nextLevel(){ G.level=Math.min(G.level+1,1000); startLevel(); }
function resetGame(){ G.level=1;G.lives=3;G.score=0;G.gameOver=false; startLevel(); }

function buildDPad(th){
  const dp=document.getElementById('dpad');
  dp.innerHTML='';
  [[null],[-1,0,'▲'],[null],[0,-1,'◄'],[null],[0,1,'►'],[null],[1,0,'▼'],[null]].forEach(b=>{
    const d=document.createElement('div');
    if(b&&b.length>1){
      d.innerHTML=`<button ontouchstart="move(${b[0]},${b[1]})" onclick="move(${b[0]},${b[1]})" style="width:56px;height:56px;background:${th.wall}22;border:2px solid ${th.wall};border-radius:12px;color:${th.wall};font-size:20px;font-weight:bold;display:flex;align-items:center;justify-content:center">${b[2]}</button>`;
    } else {
      d.style.width='56px'; d.style.height='56px';
    }
    dp.appendChild(d);
  });
}

// Touch swipe
const cv=document.getElementById('maze-canvas');
cv.addEventListener('touchstart',e=>{e.preventDefault();touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:false});
cv.addEventListener('touchend',e=>{
  if(!touchStart) return;
  const dx=e.changedTouches[0].clientX-touchStart.x, dy=e.changedTouches[0].clientY-touchStart.y;
  if(Math.abs(dx)>Math.abs(dy)) move(0,dx>0?1:-1); else move(dy>0?1:-1,0);
  touchStart=null;
},{passive:false});

// Keyboard
document.addEventListener('keydown',e=>{
  const map={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
  if(map[e.key]){e.preventDefault();move(...map[e.key]);}
});

// ── Store ──────────────────────────────────────────────────────
function renderStore(){
  document.getElementById('s-coins').textContent='🪙'+G.coins;
  document.getElementById('store-items').innerHTML=ITEMS.map(item=>`
    <div style="background:#fff1;border:1px solid #a78bfa44;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:22px">${item.icon} <span style="color:#fff;font-weight:bold;font-size:16px">${item.name}</span></div>
        <div style="color:#999;font-size:13px;margin-top:2px">${item.desc}</div>
      </div>
      <button onclick="buyItem('${item.id}')" style="background:${G.coins>=item.price?'#a78bfa':'#444'};color:#fff;border-radius:20px;padding:8px 16px;font-weight:bold;font-size:14px">🪙${item.price}</button>
    </div>`).join('');
}

function buyItem(id){
  const item=ITEMS.find(i=>i.id===id);
  if(G.coins<item.price){toast('❌ Not enough coins!');return;}
  G.coins-=item.price;
  if(id==='hint'){
    const cols=getCols(),rows=getRows();
    G.hintPath=solveMaze(maze,pos.r,pos.c,rows-1,cols-1);
    G.hint=true; toast('💡 Hint activated!'); drawMaze();
  }
  if(id==='lives'){G.lives+=3;toast('❤️ +3 Lives!');}
  if(id==='time'){G.timeBonus+=30;toast('⏱ +30s added!');}
  if(id==='skip'){G.level=Math.min(G.level+1,1000);toast('⏭ Level skipped!');}
  show('game');
}

function freeCoins(amt,icon){G.coins+=amt;toast(`${icon} +${amt} 🪙`);renderStore();}

// ── Leaderboard ────────────────────────────────────────────────
function renderLB(){
  document.getElementById('lb-list').innerHTML=G.lb.map((p,i)=>`
    <div style="background:${p.name==='You'?'#fbbf2422':'#fff0a'};border:1px solid ${p.name==='You'?'#fbbf24':'#fff1'};border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px">
      <div style="color:${i===0?'#fbbf24':i===1?'#94a3b8':i===2?'#cd7c32':'#fff'};font-size:22px;font-weight:bold;width:28px">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</div>
      <div style="flex:1"><div style="color:${p.name==='You'?'#fbbf24':'#fff'};font-weight:bold;font-size:15px">${p.name}</div><div style="color:#999;font-size:12px">Level ${p.level}</div></div>
      <div style="color:#a78bfa;font-weight:bold;font-size:16px">${p.score.toLocaleString()}</div>
    </div>`).join('');
}

// ── Daily ──────────────────────────────────────────────────────
const REWARDS=[50,100,150,200,250,300,500];
function renderDaily(){
  document.getElementById('streak-val').textContent=G.streak+' Days';
  document.getElementById('daily-grid').innerHTML=REWARDS.map((r,i)=>`
    <div style="background:${i<G.streak-1?'#34d39922':i===G.streak-1?'#fbbf2422':'#fff1'};border:1px solid ${i<G.streak-1?'#34d399':i===G.streak-1?'#fbbf24':'#fff2'};border-radius:12px;padding:12px 8px;text-align:center">
      <div style="font-size:11px;color:#999">Day ${i+1}</div>
      <div style="font-size:22px">${i===6?'💎':'🪙'}</div>
      <div style="color:${i<G.streak-1?'#34d399':i===G.streak-1?'#fbbf24':'#fff'};font-weight:bold;font-size:14px">${r}</div>
      ${i<G.streak-1?'<div style="font-size:16px">✅</div>':''}
    </div>`).join('');
  const btn=document.getElementById('claim-btn');
  if(G.dailyClaimed){btn.textContent='✅ Claimed';btn.style.background='#444';btn.style.color='#999';}
  else{btn.textContent=`🎁 Claim ${REWARDS[Math.min(G.streak-1,6)]} Coins`;btn.style.background='#34d399';btn.style.color='#000';}
}

function claimDaily(){
  if(G.dailyClaimed){toast('✅ Already claimed!');return;}
  const r=REWARDS[Math.min(G.streak-1,6)];
  G.coins+=r; G.dailyClaimed=true; G.streak++;
  toast(`🎁 +${r} 🪙`); renderDaily();
}

// Init
updateHome();
</script>
</body>
</html>
